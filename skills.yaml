skills:
  - name: nsfc-project-review
    repository: GuangyaoYin/skill-nsfc-project-review
    url: https://github.com/GuangyaoYin/skill-nsfc-project-review
    path: .
    language: zh-CN
    category: research-review
    description: Batch review National Natural Science Foundation of China project application PDFs and generate formal Chinese communication-review outputs.
    install: python ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py --repo GuangyaoYin/skill-nsfc-project-review --path .

  - name: paper2pdf
    repository: GuangyaoYin/skill-paper2pdf
    url: https://github.com/GuangyaoYin/skill-paper2pdf
    path: paper2pdf
    language: zh-CN,en
    category: academic-formatting
    description: Format academic manuscripts into polished DOCX/PDF-style layouts using journal templates, publisher guidelines, sample PDFs, or SciSpace format links.
    install: python ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py --repo GuangyaoYin/skill-paper2pdf --path paper2pdf

  - name: review-response-docx
    repository: GuangyaoYin/skill-review-response-docx
    url: https://github.com/GuangyaoYin/skill-review-response-docx
    path: review-response-docx
    language: zh-CN,en
    category: academic-revision
    description: Draft, analyze, format, and package point-by-point reviewer responses and revised manuscript DOCX files.
    install: python ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py --repo GuangyaoYin/skill-review-response-docx --path review-response-docx

  - name: skill-endnote-research
    repository: GuangyaoYin/skill-endnote-research
    url: https://github.com/GuangyaoYin/skill-endnote-research
    path: .
    language: zh-CN,en
    category: literature-research
    description: Analyze research ideas, search a local EndNote literature index, copy matching PDFs, and generate a literature-review folder.
    install: python ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py --repo GuangyaoYin/skill-endnote-research --path .

  - name: locflow
    repository: GuangyaoYin/skills
    url: https://github.com/GuangyaoYin/skills/tree/main/skills/locflow
    path: skills/locflow
    language: zh-CN,en
    category: seismology-processing
    description: Manage an end-to-end LOC-FLOW earthquake catalog workflow with PhaseNet, REAL, VELEST, hypoDD dtct, FDTCC, hypoDD dtcc, QC gates, PyGMT figures, and final workflow reports.
    install: python ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py --repo GuangyaoYin/skills --path skills/locflow

  - name: earthquake-mc
    repository: GuangyaoYin/skills
    url: https://github.com/GuangyaoYin/skills/tree/main/skills/earthquake-mc
    path: skills/earthquake-mc
    language: zh-CN,en
    category: seismology-statistics
    description: Estimate earthquake catalog completeness magnitude Mc using normalized cumulative occurrence curves, candidate-threshold diagnostics, and reproducible reports.
    install: python ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py --repo GuangyaoYin/skills --path skills/earthquake-mc

  - name: skillscreator
    repository: GuangyaoYin/skill-skillscreator
    url: https://github.com/GuangyaoYin/skill-skillscreator
    path: skillscreator
    language: zh-CN,en
    category: skill-development
    description: Design, generate, validate, and optionally publish Codex skills from task ideas, workflows, examples, documents, webpages, repositories, or prior context.
    install: python ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py --repo GuangyaoYin/skill-skillscreator --path skillscreator
